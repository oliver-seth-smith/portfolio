server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    charset utf-8;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'none'; font-src 'self'; form-action 'self'; frame-ancestors 'self'; img-src 'self' data:; manifest-src 'self'; media-src 'self'; object-src 'none'; script-src 'self' 'sha256-aPOAD9ys/CoBrhOlOJoHKqjXcVuUWZFf3GwSWeKnOhU='; style-src 'self'; upgrade-insecure-requests" always;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /index.html {
        expires -1;
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|webp)$ {
        try_files $uri =404;
        expires 1h;
    }

    location ~* \.pdf$ {
        try_files $uri =404;
        expires -1;
    }
}
